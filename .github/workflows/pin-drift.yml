name: Marketplace pin drift check

# Compares every url-sourced plugin pin in marketplace.json against the
# upstream repo's plugin.json version on main. Opens (or comments on) an
# issue when a pin has fallen behind, so a released plugin can no longer
# sit unpublished in the marketplace unnoticed.
on:
  schedule:
    - cron: "0 15 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compare pins to upstream versions
        id: drift
        run: |
          drift=""
          while read -r row; do
            name=$(echo "$row" | jq -r .name)
            url=$(echo "$row" | jq -r .url)
            ref=$(echo "$row" | jq -r .ref)
            slug=$(echo "$url" | sed -E 's#https://github.com/##; s#\.git$##')
            ver=$(curl -fsSL "https://raw.githubusercontent.com/$slug/main/.claude-plugin/plugin.json" | jq -r .version || true)
            if [ -n "$ver" ] && [ "$ver" != "null" ] && [ "v$ver" != "$ref" ]; then
              drift="${drift}- **$name**: pinned \`$ref\`, upstream main is \`v$ver\` ($slug)"$'\n'
            fi
          done < <(jq -c '.plugins[] | select(.source.source == "url") | {name: .name, url: .source.url, ref: .source.ref}' .claude-plugin/marketplace.json)
          if [ -n "$drift" ]; then
            echo "drift_found=true" >> "$GITHUB_OUTPUT"
            {
              echo "body<<EOF"
              echo "The following marketplace pins are behind their upstream repo's main:"
              echo
              printf '%s' "$drift"
              echo
              echo "Bump the \`ref\` and \`sha\` in \`.claude-plugin/marketplace.json\` (and refresh the plugin's README/description copy if command surfaces changed)."
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            printf 'Drift detected:\n%s' "$drift"
          else
            echo "drift_found=false" >> "$GITHUB_OUTPUT"
            echo "All pins match upstream versions."
          fi

      - name: Open or update drift issue
        if: steps.drift.outputs.drift_found == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          existing=$(gh issue list --repo "$GITHUB_REPOSITORY" --state open --search "Marketplace pin drift in:title" --json number -q '.[0].number')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "$GITHUB_REPOSITORY" --body "${{ steps.drift.outputs.body }}"
          else
            gh issue create --repo "$GITHUB_REPOSITORY" --title "Marketplace pin drift" --body "${{ steps.drift.outputs.body }}"
          fi
