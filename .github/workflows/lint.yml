name: Lint & Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  json-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate marketplace JSON
        run: |
          python3 -m json.tool .claude-plugin/marketplace.json > /dev/null
          python3 -m json.tool .agents/plugins/marketplace.json > /dev/null
          echo "Both marketplace manifests are valid JSON"

      - name: Validate Codex marketplace contract
        run: |
          jq -e '.name | type == "string" and length > 0' \
            .agents/plugins/marketplace.json > /dev/null
          jq -e '
            all(.plugins[];
              (.name | type == "string" and length > 0) and
              (.source.source == "url") and
              (.source.url | type == "string" and startswith("https://")) and
              (.source.ref | type == "string" and length > 0) and
              (.source.sha | type == "string" and test("^[0-9a-f]{40}$")) and
              (.policy.installation | IN("NOT_AVAILABLE", "AVAILABLE", "INSTALLED_BY_DEFAULT")) and
              (.policy.authentication | IN("ON_INSTALL", "ON_USE")) and
              (.category | type == "string" and length > 0)
            )
          ' .agents/plugins/marketplace.json > /dev/null

      - name: Check Claude and Codex catalogs stay pinned together
        run: |
          jq -S '[.plugins[] | {name, url: .source.url, ref: .source.ref, sha: .source.sha}] | sort_by(.name)' \
            .claude-plugin/marketplace.json > /tmp/claude-catalog.json
          jq -S '[.plugins[] | {name, url: .source.url, ref: .source.ref, sha: .source.sha}] | sort_by(.name)' \
            .agents/plugins/marketplace.json > /tmp/codex-catalog.json
          diff -u /tmp/claude-catalog.json /tmp/codex-catalog.json

      - name: Check README badges use pinned release tags
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          catalog = json.loads(Path('.claude-plugin/marketplace.json').read_text())
          readme = Path('README.md').read_text()
          for plugin in catalog['plugins']:
              name = plugin['name']
              ref = plugin['source']['ref']
              marker = f'MisterVitoPro%2F{name}%2F{ref}%2F.claude-plugin%2Fplugin.json'
              if marker not in readme:
                  raise SystemExit(f'README badge for {name} is not pinned to {ref}')
          PY

  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check repository guidance
        run: |
          test -r README.md
          test -r CLAUDE.md
          test -r AGENTS.md
